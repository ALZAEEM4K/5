<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Bloom — ZAEEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@200;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060812;
            --fg: #e0e6ed;
            --c-gold: #ffb86b;
            --c-red: #ff3e6c;
            --c-blue: #4d9eff;
            --c-purple: #bd93f9;
            --c-white: #f8f8f2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--fg); font-family: 'Amiri', serif; overflow: hidden; width: 100vw; height: 100vh; }

        /* واجهة البداية */
        .intro {
            position: fixed; inset: 0; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
            background: radial-gradient(circle at 50% 50%, #0a0e1c 0%, #000 100%);
            transition: opacity 1s ease, filter 1s ease;
        }
        .intro.gone { opacity: 0; filter: blur(20px); pointer-events: none; }
        .intro-title {
            font-size: clamp(2.5rem, 6vw, 4rem); color: transparent;
            font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(180deg, #fff, var(--c-gold));
            -webkit-background-clip: text; background-clip: text;
            text-shadow: 0 0 40px rgba(255, 184, 107, 0.3);
        }
        .intro-sub { font-size: 1rem; color: rgba(224, 230, 237, 0.4); font-family: 'Cairo', sans-serif; letter-spacing: 6px; text-transform: uppercase; }
        .upload-zone {
            width: min(90vw, 380px); padding: 2rem; border: 1px solid rgba(255, 184, 107, 0.2);
            display: flex; flex-direction: column; align-items: center; gap: 1rem; cursor: pointer;
            transition: all 0.4s ease; background: rgba(255, 184, 107, 0.02); backdrop-filter: blur(5px);
        }
        .upload-zone:hover { border-color: var(--c-gold); box-shadow: 0 0 40px rgba(255, 184, 107, 0.1); }
        .upload-zone.has-file { border-color: var(--c-gold); background: rgba(255, 184, 107, 0.05); }
        .upload-icon { font-size: 2rem; color: var(--c-gold); }
        .upload-text { font-size: 0.9rem; color: rgba(224, 230, 237, 0.5); font-family: 'Cairo', sans-serif; }
        .upload-filename { font-size: 0.8rem; color: var(--c-gold); font-family: 'Cairo', sans-serif; direction: ltr; }
        .play-btn {
            padding: 0.8rem 3rem; cursor: pointer; background: transparent; border: 1px solid var(--c-gold);
            color: var(--c-gold); font-family: 'Cairo', sans-serif; font-size: 0.9rem;
            letter-spacing: 4px; transition: all 0.4s ease; opacity: 0.2; pointer-events: none;
        }
        .play-btn.ready { opacity: 1; pointer-events: auto; box-shadow: 0 0 30px rgba(255, 184, 107, 0.2); }
        .play-btn.ready:hover { background: var(--c-gold); color: #000; box-shadow: 0 0 60px rgba(255, 184, 107, 0.5); }
        .skip-note { font-size: 0.75rem; color: rgba(224, 230, 237, 0.2); cursor: pointer; text-decoration: underline; font-family: 'Cairo', sans-serif; }

        /* روح زعيم */
        .zaeem-soul {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 60vmin; height: 60vmin;
            background-image: url('https://z-cdn-media.chatglm.cn/files/e58422ca-f52d-459f-b07d-2beac3f4fc2c.jpg?auth_key=1884551388-c339c3c336e64901b001d214db38941a-0-1bd04176d2c93e8bbb89f5d394070cf7');
            background-size: cover; background-position: center;
            border-radius: 50%; opacity: 0.08; mix-blend-mode: screen;
            filter: blur(2px) contrast(1.5) brightness(1.2);
            z-index: 1; pointer-events: none;
            transition: filter 1.5s ease;
        }

        #art-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .bg-pulse { position: fixed; inset: 0; z-index: -1; background: var(--bg); transition: background 1.5s ease; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 50%, transparent 15%, rgba(0,0,0,0.95) 90%); z-index: 3; pointer-events: none; }

        /* الكلمات */
        .content { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .verse { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; opacity: 0; width: 100%; transition: opacity 0.5s ease; }
        .verse.active { opacity: 1; }
        .w {
            display: inline-block; opacity: 0; transform: scale(0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
            line-height: 1.6; font-weight: 700; text-align: center;
        }
        .w.show { opacity: 1; transform: scale(1); }

        [data-fx="stranger"] { font-size: clamp(2.5rem, 7vw, 5rem); color: var(--c-blue); text-shadow: 0 0 30px var(--c-blue); }
        [data-fx="forget"] { font-size: clamp(2.5rem, 7vw, 5rem); color: var(--c-white); text-shadow: 0 0 30px var(--c-white); }
        [data-fx="secrets"] { font-size: clamp(2.5rem, 7vw, 5rem); color: var(--c-purple); text-shadow: 0 0 30px var(--c-purple); }
        [data-fx="sorrows"] { font-size: clamp(3rem, 8vw, 6rem); color: var(--c-red); text-shadow: 0 0 40px var(--c-red); }
        [data-fx="dar"] { font-size: clamp(2.5rem, 7vw, 5rem); color: var(--c-gold); text-shadow: 0 0 30px var(--c-gold); }

        /* شاشة النهاية */
        .ending { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 2s ease; background: radial-gradient(circle at center, #0a0e1c 0%, #000 100%); }
        .ending.show { opacity: 1; pointer-events: auto; }
        .end-logo-container { position: relative; width: 200px; height: 200px; opacity: 0; transform: scale(0.5); transition: opacity 2s ease, transform 2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .ending.show .end-logo-container { opacity: 1; transform: scale(1); }
        .end-logo { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 30px rgba(255, 184, 107, 0.4)); }
        .end-title { font-family: 'Cairo', sans-serif; font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; background: linear-gradient(90deg, #fff, var(--c-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; transform: translateY(30px); transition: all 2s ease 1s; letter-spacing: 15px; }
        .ending.show .end-title { opacity: 1; transform: translateY(0); }
        .end-credit { font-family: 'Amiri', serif; font-size: 1.2rem; color: rgba(224, 230, 237, 0.4); opacity: 0; transition: opacity 2s ease 2s; }
        .ending.show .end-credit { opacity: 1; }
        .ending-replay { margin-top: 2rem; font-family: 'Cairo', sans-serif; font-size: 0.8rem; color: rgba(224, 230, 237, 0.3); cursor: pointer; border: 1px solid rgba(224, 230, 237, 0.2); padding: 0.6rem 2.5rem; transition: all 0.4s; opacity: 0; }
        .ending.show .ending-replay { opacity: 1; }
        .ending-replay:hover { border-color: var(--c-gold); color: var(--c-gold); box-shadow: 0 0 20px rgba(255, 184, 107, 0.2); }
    </style>
</head>
<body>
    <div class="intro" id="intro">
        <div class="intro-title">أحزاني</div>
        <div class="intro-sub">تجربة بصرية وصوتية خارقة</div>
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">&#9835;</div>
            <div class="upload-text">اختار ملف الصوت (الأغنية)</div>
            <div class="upload-filename" id="fileName"></div>
        </div>
        <input type="file" id="audioInput" accept="audio/*" hidden>
        <button class="play-btn" id="playBtn">ابدأ العرض</button>
        <div class="skip-note" id="skipNote">شغل بدون صوت</div>
    </div>

    <div class="zaeem-soul" id="zaeemSoul"></div>
    <div class="bg-pulse" id="bgp"></div>
    <canvas id="art-canvas"></canvas>
    <div class="vignette"></div>

    <main class="content">
        <div class="verse" id="v1">
            <div class="line"><span class="w" data-t="0.5" data-fx="stranger">يمكن بكرا الحبيب</span></div>
            <div class="line"><span class="w" data-t="4.5" data-fx="stranger">يمرق مثل الغريب</span></div>
        </div>
        <div class="verse" id="v2">
            <div class="line"><span class="w" data-t="8.5" data-fx="forget">وما يذكر اللي كان</span></div>
            <div class="line"><span class="w" data-t="12.5" data-fx="secrets">بيني وبينك في أسرار</span></div>
        </div>
        <div class="verse" id="v3">
            <div class="line"><span class="w" data-t="16.5" data-fx="sorrows">وبتعرف أحزاني</span></div>
            <div class="line"><span class="w" data-t="20.5" data-fx="dar">ابقى ائمرق لي على هالدار</span></div>
        </div>
        <div class="verse" id="v4">
            <div class="line"><span class="w" data-t="24.5" data-fx="forget">واللي بينسى ينساني</span></div>
        </div>
    </main>

    <div class="ending" id="ending">
        <div class="end-logo-container">
            <img src="https://z-cdn-media.chatglm.cn/files/e58422ca-f52d-459f-b07d-2beac3f4fc2c.jpg?auth_key=1884551388-c339c3c336e64901b001d214db38941a-0-1bd04176d2c93e8bbb89f5d394070cf7" class="end-logo" alt="ZAEEM">
        </div>
        <div class="end-title">ZAEEM</div>
        <div class="end-credit">تصميم وإخراج : انس احمد</div>
        <div class="ending-replay" id="replayBtn">إعادة العرض</div>
    </div>

    <audio id="audioEl" preload="auto"></audio>

    <script>
    // ⚙️ التزامن الصوتي: الكلمات تظهر 1 ثانية بدري
    const SYNC_OFFSET = -1.0; 

    const audioEl = document.getElementById('audioEl');
    const zaeemSoul = document.getElementById('zaeemSoul');
    const bgp = document.getElementById('bgp');
    const artCvs = document.getElementById('art-canvas');
    const artCtx = artCvs.getContext('2d');
    let AW, AH;

    function resizeArt() { AW = artCvs.width = innerWidth; AH = artCvs.height = innerHeight; }
    resizeArt();
    addEventListener('resize', resizeArt);

    let audioCtx, analyser, dataArray, source;
    let bassLevel = 0, midLevel = 0, highLevel = 0;
    let currentMood = { color: '#4d9eff', rgb: '77, 158, 255' };
    let time = 0;
    let artActive = false;

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaElementSource(audioEl);
        analyser = audioCtx.createAnalyser();
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function getAudioData() {
        if(!analyser) return { bass: 0, mid: 0, high: 0 };
        analyser.getByteFrequencyData(dataArray);
        let bSum=0, mSum=0, hSum=0;
        for(let i=0; i<6; i++) bSum += dataArray[i];
        for(let i=6; i<20; i++) mSum += dataArray[i];
        for(let i=20; i<60; i++) hSum += dataArray[i];
        return {
            bass: bSum / 6 / 255,
            mid: mSum / 14 / 255,
            high: hSum / 40 / 255
        };
    }

    function animateArt() {
        if (!artActive) return;
        time += 0.01;
        const audio = getAudioData();
        bassLevel = audio.bass;
        midLevel = audio.mid;
        highLevel = audio.high;

        artCtx.fillStyle = `rgba(6, 8, 18, 0.2)`;
        artCtx.fillRect(0, 0, AW, AH);

        const cx = AW / 2, cy = AH / 2;
        
        const soulScale = 0.8 + bassLevel * 0.4;
        zaeemSoul.style.transform = `translate(-50%, -50%) scale(${soulScale}) rotate(${time * 2}deg)`;
        zaeemSoul.style.opacity = 0.05 + bassLevel * 0.15;

        const layers = 5;
        for(let l = 0; l < layers; l++) {
            artCtx.beginPath();
            const points = 100;
            const baseRadius = Math.max(1, 100 + l * 80 + bassLevel * 150);
            
            for(let p = 0; p <= points; p++) {
                const angle = (p / points) * Math.PI * 2;
                const wave = Math.sin(angle * (3 + l) + time * (1 + l * 0.3)) * (20 + midLevel * 60);
                const r = baseRadius + wave;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                
                if(p === 0) artCtx.moveTo(x, y);
                else artCtx.lineTo(x, y);
            }
            
            artCtx.closePath();
            artCtx.strokeStyle = `rgba(${currentMood.rgb}, ${0.3 - l * 0.05 + bassLevel * 0.2})`;
            artCtx.lineWidth = Math.max(0.5, 1.5 + bassLevel * 4);
            artCtx.shadowBlur = 20 + bassLevel * 40;
            artCtx.shadowColor = currentMood.color;
            artCtx.stroke();
        }
        artCtx.shadowBlur = 0;

        const coreR = Math.max(1, 50 + bassLevel * 100);
        const grad = artCtx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
        grad.addColorStop(0, `rgba(${currentMood.rgb}, ${0.4 + bassLevel * 0.5})`);
        grad.addColorStop(1, 'transparent');
        artCtx.fillStyle = grad;
        artCtx.beginPath();
        artCtx.arc(cx, cy, coreR, 0, Math.PI * 2);
        artCtx.fill();

        requestAnimationFrame(animateArt);
    }

    function setMood(type) {
        if (type === 'stranger') { currentMood = { color: '#4d9eff', rgb: '77, 158, 255' }; bgp.style.background = '#060812'; zaeemSoul.style.filter = 'blur(2px) contrast(1.5) hue-rotate(180deg) brightness(1.2)'; }
        else if (type === 'forget') { currentMood = { color: '#f8f8f2', rgb: '248, 248, 242' }; bgp.style.background = '#0a0a0a'; zaeemSoul.style.filter = 'blur(3px) contrast(1.2) brightness(1)'; }
        else if (type === 'secrets') { currentMood = { color: '#bd93f9', rgb: '189, 147, 249' }; bgp.style.background = '#080612'; zaeemSoul.style.filter = 'blur(2px) contrast(1.5) hue-rotate(230deg) brightness(1.1)'; }
        else if (type === 'sorrows') { currentMood = { color: '#ff3e6c', rgb: '255, 62, 108' }; bgp.style.background = '#120208'; zaeemSoul.style.filter = 'blur(4px) contrast(1.2) hue-rotate(310deg) brightness(1.2)'; }
        else if (type === 'dar') { currentMood = { color: '#ffb86b', rgb: '255, 184, 107' }; bgp.style.background = '#120c06'; zaeemSoul.style.filter = 'blur(2px) contrast(1.4) hue-rotate(20deg) brightness(1.3)'; }
    }

    const intro = document.getElementById('intro');
    const uploadZone = document.getElementById('uploadZone');
    const audioInput = document.getElementById('audioInput');
    const fileNameEl = document.getElementById('fileName');
    const playBtn = document.getElementById('playBtn');
    const skipNote = document.getElementById('skipNote');
    const ending = document.getElementById('ending');
    const replayBtn = document.getElementById('replayBtn');

    let audioFile = null;
    let started = false;
    let activeVerse = null;

    uploadZone.addEventListener('click', () => audioInput.click());
    audioInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        audioFile = file;
        fileNameEl.textContent = file.name;
        uploadZone.classList.add('has-file');
        playBtn.classList.add('ready');
    });

    skipNote.addEventListener('click', () => { audioFile = null; startShow(); });
    playBtn.addEventListener('click', () => { if (!audioFile && !playBtn.classList.contains('ready')) return; startShow(); });
    replayBtn.addEventListener('click', () => location.reload());

    function startShow() {
        if (started) return;
        started = true;

        if (audioFile) {
            audioEl.src = URL.createObjectURL(audioFile);
            audioEl.play().then(() => {
                setupAudio();
                syncLyrics(); 
            }).catch(() => {
                syncLyrics(true);
            });
        } else {
            syncLyrics(true); 
        }

        intro.classList.add('gone');
        artActive = true;
        setMood('stranger');
        animateArt();
    }

    const verses = [
        { id: 'v1', start: 0, end: 8.5 },
        { id: 'v2', start: 8.5, end: 16.5 },
        { id: 'v3', start: 16.5, end: 24.5 },
        { id: 'v4', start: 24.5, end: 30 }
    ];
    
    let fakeTime = 0; 
    let lastSyncTime = performance.now();

    function syncLyrics(noAudio = false) {
        const words = document.querySelectorAll('.w');
        let triggeredWords = new Set();
        
        function tick() {
            let currentT;
            if (noAudio) {
                const now = performance.now();
                fakeTime += (now - lastSyncTime) / 1000;
                lastSyncTime = now;
                currentT = fakeTime;
            } else {
                currentT = audioEl.currentTime;
            }

            // التعديل السحري لجعل الكلمات تظهر بدري ثانية
            const adjustedTime = currentT - SYNC_OFFSET; 

            // إظهار الكلمات بناءً على الوقت المعدل
            words.forEach(w => {
                const t = parseFloat(w.dataset.t);
                if (adjustedTime >= t && !triggeredWords.has(w)) {
                    w.classList.add('show');
                    triggeredWords.add(w);
                    setMood(w.dataset.fx);
                }
            });

            // إظهار وإخفاء المقاطع بناءً على الوقت المعدل
            verses.forEach(v => {
                const el = document.getElementById(v.id);
                if (adjustedTime >= v.start && adjustedTime < v.end) {
                    if (activeVerse !== v.id) {
                        if (activeVerse) document.getElementById(activeVerse).classList.remove('active');
                        el.classList.add('active');
                        activeVerse = v.id;
                    }
                }
            });

            // إخفاء المقطع الأخير قبل النهاية بخطوة
            if (adjustedTime >= 29.5) {
                if (activeVerse) {
                    document.getElementById(activeVerse).classList.remove('active');
                    activeVerse = null;
                }
            }
            
            // إظهار شاشة النهاية بناءً على الوقت الفعلي للأغنية وليس المعدل
            if (currentT >= 30) {
                artActive = false;
                artCtx.clearRect(0, 0, AW, AH);
                zaeemSoul.style.opacity = '0';
                ending.classList.add('show');
                if (!noAudio) audioEl.pause();
                return; 
            }

            requestAnimationFrame(tick);
        }
        lastSyncTime = performance.now();
        tick();
    }
    </script>
</body>
</html>
